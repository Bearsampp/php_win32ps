version: 2026.3.1.{build}

environment:
  matrix:
    - PHP_VERSION: 8.5
      VC_VERSION: 17
      ARCH: x64
    - PHP_VERSION: 8.5
      VC_VERSION: 17
      ARCH: x86

image: Visual Studio 2022

branches:
  only:
    - main
    - /^8\.\d+$/

skip_tags: false

install:
  - ps: |
      $arch = $env:ARCH
      $phpVersion = $env:PHP_VERSION
      $vcVersion = $env:VC_VERSION
      
      if ($arch -eq "x64") {
        $archSuffix = "x64"
      } else {
        $archSuffix = "x86"
      }
      
      $phpSdkDir = "C:\php-sdk"
      $phpDevDir = "C:\php-dev"
      
      if (Test-Path $phpSdkDir) { Remove-Item $phpSdkDir -Recurse -Force }
      if (Test-Path $phpDevDir) { Remove-Item $phpDevDir -Recurse -Force }
      
      New-Item -ItemType Directory -Path $phpSdkDir | Out-Null
      New-Item -ItemType Directory -Path $phpDevDir | Out-Null
      
      Write-Host "Downloading PHP SDK..."
      $sdkUrl = "https://github.com/php/php-sdk-binary-tools/archive/refs/heads/master.zip"
      $sdkZip = "C:\php-sdk.zip"
      
      (New-Object Net.WebClient).DownloadFile($sdkUrl, $sdkZip)
      Add-Type -AssemblyName System.IO.Compression.FileSystem
      [System.IO.Compression.ZipFile]::ExtractToDirectory($sdkZip, $phpSdkDir)
      
      $extracted = Get-ChildItem $phpSdkDir | Select-Object -First 1
      Move-Item "$phpSdkDir\$extracted\*" $phpSdkDir -Force
      Remove-Item "$phpSdkDir\$extracted" -Force
      
      $version = "8.5.1"
      $phpZip = "C:\php-dev.zip"
      
      Write-Host "Downloading PHP dev pack..."
      
      $phpUrl = "https://windows.php.net/downloads/releases/php-devel-pack-8.5.1-Win32-vs17-${archSuffix}.zip"
      
      Write-Host "URL: $phpUrl"
      
      try {
        [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.SecurityProtocolType]::Tls12
        $webClient = New-Object System.Net.WebClient
        $webClient.DownloadFile($phpUrl, $phpZip)
        
        $fileInfo = Get-Item $phpZip
        Write-Host "Downloaded file size: $($fileInfo.Length) bytes"
        
        if ($fileInfo.Length -lt 100KB) {
          Write-Host "ERROR: Downloaded file is too small (likely an error page)"
          Write-Host "Attempting to read file content:"
          try {
            $content = Get-Content $phpZip -Raw
            Write-Host "Content: $content"
          } catch {
            Write-Host "Could not read file"
          }
          exit 1
        }
        
        Write-Host "Extracting PHP dev pack..."
        [System.IO.Compression.ZipFile]::ExtractToDirectory($phpZip, $phpDevDir)
        Write-Host "Extracted PHP $version successfully"
      } catch {
        Write-Host "ERROR: Failed to download/extract PHP dev pack: $_"
        exit 1
      }
      
      $env:PHP_DEV_PATH = $phpDevDir
      $env:PHP_SDK_PATH = $phpSdkDir

build_script:
  - ps: |
      $arch = $env:ARCH
      $phpDevPath = $env:PHP_DEV_PATH
      
      if ($arch -eq "x64") {
        $vsArch = "amd64"
      } else {
        $vsArch = "x86"
      }
      
      cd $env:APPVEYOR_BUILD_FOLDER
      
      $vsPath = "C:\Program Files\Microsoft Visual Studio\2022\Community"
      $vcvarsPath = "$vsPath\VC\Auxiliary\Build\vcvars${vsArch}.bat"
      
      Write-Host "Setting up Visual Studio environment..."
      & cmd /c "$vcvarsPath && set" | ForEach-Object {
        if ($_ -match "^(.*?)=(.*)$") {
          [Environment]::SetEnvironmentVariable($matches[1], $matches[2])
        }
      }
      
      $env:INCLUDE = "$phpDevPath;$env:INCLUDE"
      $env:LIB = "$phpDevPath;$env:LIB"
      
      Write-Host "Running buildconf..."
      & cmd /c "php.exe buildconf.bat"
      
      Write-Host "Running configure..."
      & cmd /c "configure.bat --enable-win32ps"
      
      Write-Host "Running nmake..."
      & cmd /c "nmake"

after_build:
  - ps: |
      $arch = $env:ARCH
      $buildNumber = $env:APPVEYOR_BUILD_NUMBER
      $version = "2026.3.1.$buildNumber"
      
      $outputDir = "C:\artifacts"
      if (Test-Path $outputDir) { Remove-Item $outputDir -Recurse -Force }
      New-Item -ItemType Directory -Path $outputDir | Out-Null
      
      $dllLocations = @(
        "Release_TS\php_win32ps.dll",
        "Release\php_win32ps.dll"
      )
      
      $found = $false
      foreach ($location in $dllLocations) {
        if (Test-Path $location) {
          Copy-Item $location "$outputDir\php_win32ps-${version}-${arch}.dll"
          $found = $true
          break
        }
      }
      
      if (-not $found) {
        $dlls = Get-ChildItem -Recurse -Filter "php_win32ps.dll" -ErrorAction SilentlyContinue
        if ($dlls) {
          Copy-Item $dlls[0].FullName "$outputDir\php_win32ps-${version}-${arch}.dll"
          $found = $true
        }
      }
      
      if ($found) {
        Write-Host "DLL copied to artifacts"
      }

artifacts:
  - path: C:\artifacts\*
    name: php_win32ps

deploy:
  - provider: GitHub
    auth_token:
      secure: YOUR_GITHUB_TOKEN_HERE
    artifact: php_win32ps
    draft: false
    prerelease: false
    on:
      branch: main
      appveyor_repo_tag: true

on_success:
  - ps: Write-Host "Build successful for PHP $env:PHP_VERSION ($env:ARCH)"

on_failure:
  - ps: Write-Host "Build failed for PHP $env:PHP_VERSION ($env:ARCH)"
