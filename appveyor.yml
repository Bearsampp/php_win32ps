version: 2026.3.1.{build}

environment:
  matrix:
    - PHP_VERSION: 8.5.30
      DEV_PACK_VERSION: 8.5.1
      VC_VERSION: vs17
      ARCH: x64
    - PHP_VERSION: 8.5.30
      DEV_PACK_VERSION: 8.5.1
      VC_VERSION: vs17
      ARCH: x86

image: Visual Studio 2022

branches:
  only:
    - main
    - /^8\.\d+$/

skip_tags: false

install:
  - ps: |
      Write-Host "Installing bison..."
      $bisonDir = "C:\bison"
      if (-not (Test-Path $bisonDir)) {
        New-Item -ItemType Directory -Path $bisonDir | Out-Null
      }
      
      $bisonUrl = "https://github.com/lexxmark/winflexbison/releases/download/v2.5.25/win_flex_bison-2.5.25.zip"
      $bisonZip = "C:\bison.zip"
      
      Write-Host "Downloading bison from $bisonUrl"
      try {
        [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.SecurityProtocolType]::Tls12
        $webClient = New-Object System.Net.WebClient
        $webClient.DownloadFile($bisonUrl, $bisonZip)
        Add-Type -AssemblyName System.IO.Compression.FileSystem
        [System.IO.Compression.ZipFile]::ExtractToDirectory($bisonZip, $bisonDir)
        Write-Host "Bison installed"
        $env:PATH = "$bisonDir;$env:PATH"
      } catch {
        Write-Host "Warning: Could not install bison: $_"
      }
      
      Write-Host "Installing re2c via Chocolatey..."
      choco install -y re2c
      Write-Host "re2c installed"
      
      $arch = $env:ARCH
      $devPackVersion = $env:DEV_PACK_VERSION
      $vcVersion = $env:VC_VERSION
      
      if ($arch -eq "x64") {
        $archSuffix = "x64"
      } else {
        $archSuffix = "x86"
      }
      
      $buildCache = "C:\build-cache"
      if (-not (Test-Path $buildCache)) {
        New-Item -ItemType Directory -Path $buildCache | Out-Null
      }
      
      $develPackName = "php-devel-pack-$devPackVersion-Win32-$vcVersion-$archSuffix.zip"
      $develPackPath = "$buildCache\$develPackName"
      
      Write-Host "Downloading PHP development pack: $develPackName"
      
      $url = "https://windows.php.net/downloads/releases/$develPackName"
      
      try {
        [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.SecurityProtocolType]::Tls12
        $webClient = New-Object System.Net.WebClient
        $webClient.Headers.Add("User-Agent", "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36")
        $webClient.DownloadFile($url, $develPackPath)
        Write-Host "Downloaded successfully"
      } catch {
        Write-Host "ERROR: Failed to download: $_"
        exit 1
      }
      
      Write-Host "Extracting $develPackName..."
      Add-Type -AssemblyName System.IO.Compression.FileSystem
      [System.IO.Compression.ZipFile]::ExtractToDirectory($develPackPath, $buildCache)
      
      $develDirName = "php-$devPackVersion-devel-$vcVersion-$archSuffix"
      $develDirPath = "$buildCache\$develDirName"
      
      if (-not (Test-Path $develDirPath)) {
        Write-Host "ERROR: Extracted directory not found at $develDirPath"
        Get-ChildItem $buildCache
        exit 1
      }
      
      Write-Host "PHP development pack extracted to: $develDirPath"
      
      $env:PHP_DEV_PATH = $develDirPath
      $env:BUILD_CACHE = $buildCache

build_script:
  - ps: |
      $arch = $env:ARCH
      $phpVersion = $env:PHP_VERSION
      $vcVersion = $env:VC_VERSION
      $develDirPath = $env:PHP_DEV_PATH
      $buildCache = $env:BUILD_CACHE
      $projectRoot = $env:APPVEYOR_BUILD_FOLDER
      
      Write-Host "Build configuration:"
      Write-Host "  ARCH: $arch"
      Write-Host "  PHP Version: $phpVersion"
      Write-Host "  VC Version: $vcVersion"
      Write-Host "  Dev Path: $develDirPath"
      Write-Host "  Project Root: $projectRoot"
      
      Set-Location $projectRoot
      
      if ($vcVersion -eq "vs17") {
        $env:PHP_SDK_VS17_DIR = "C:\Program Files\Microsoft Visual Studio\2022\Community"
        $env:PHP_SDK_VC_DIR = "C:\Program Files\Microsoft Visual Studio\2022\Community"
      }
      
      $vcvarsFile = if ($arch -eq "x64") { "vcvars64.bat" } else { "vcvars32.bat" }
      $vsPath = "C:\Program Files\Microsoft Visual Studio\2022\Community"
      $vcvarsPath = "$vsPath\VC\Auxiliary\Build\$vcvarsFile"
      
      if (-not (Test-Path $vcvarsPath)) {
        Write-Host "ERROR: vcvars not found at $vcvarsPath"
        exit 1
      }
      
      $oldPath = $env:PATH
      $env:PATH = "C:\bison;$develDirPath\bin;$develDirPath;$oldPath"
      
      $phpizePath = Join-Path $develDirPath "phpize.bat"
      
      if (-not (Test-Path $phpizePath)) {
        Write-Host "ERROR: phpize.bat not found at $phpizePath"
        Get-ChildItem $develDirPath
        exit 1
      }
      
      Write-Host "Creating build script..."
      $buildBatPath = "$projectRoot\build.bat"
      
      "@echo off" | Out-File -FilePath $buildBatPath -Encoding ASCII
      "setlocal enabledelayedexpansion" | Out-File -FilePath $buildBatPath -Append -Encoding ASCII
      "" | Out-File -FilePath $buildBatPath -Append -Encoding ASCII
      "REM Initialize Visual Studio environment" | Out-File -FilePath $buildBatPath -Append -Encoding ASCII
      "call `"$vcvarsPath`"" | Out-File -FilePath $buildBatPath -Append -Encoding ASCII
      "" | Out-File -FilePath $buildBatPath -Append -Encoding ASCII
      "REM Add bison and re2c to PATH and create bison.exe symlink" | Out-File -FilePath $buildBatPath -Append -Encoding ASCII
      "set PATH=C:\bison;C:\re2c;%PATH%" | Out-File -FilePath $buildBatPath -Append -Encoding ASCII
      "if exist C:\bison\win_bison.exe if not exist C:\bison\bison.exe copy C:\bison\win_bison.exe C:\bison\bison.exe" | Out-File -FilePath $buildBatPath -Append -Encoding ASCII
      "" | Out-File -FilePath $buildBatPath -Append -Encoding ASCII
      "REM Change to project directory" | Out-File -FilePath $buildBatPath -Append -Encoding ASCII
      "cd /d `"$projectRoot`"" | Out-File -FilePath $buildBatPath -Append -Encoding ASCII
      "" | Out-File -FilePath $buildBatPath -Append -Encoding ASCII
      "REM Run phpize" | Out-File -FilePath $buildBatPath -Append -Encoding ASCII
      "echo Running phpize..." | Out-File -FilePath $buildBatPath -Append -Encoding ASCII
      "call `"$phpizePath`"" | Out-File -FilePath $buildBatPath -Append -Encoding ASCII
      "if errorlevel 1 exit /b 1" | Out-File -FilePath $buildBatPath -Append -Encoding ASCII
      "" | Out-File -FilePath $buildBatPath -Append -Encoding ASCII
      "REM Run configure" | Out-File -FilePath $buildBatPath -Append -Encoding ASCII
      "echo Running configure..." | Out-File -FilePath $buildBatPath -Append -Encoding ASCII
      "call configure.bat --enable-win32ps=shared --enable-debug-pack --disable-all" | Out-File -FilePath $buildBatPath -Append -Encoding ASCII
      "if errorlevel 1 exit /b 1" | Out-File -FilePath $buildBatPath -Append -Encoding ASCII
      "" | Out-File -FilePath $buildBatPath -Append -Encoding ASCII
      "REM Run nmake" | Out-File -FilePath $buildBatPath -Append -Encoding ASCII
      "echo Running nmake..." | Out-File -FilePath $buildBatPath -Append -Encoding ASCII
      "nmake /nologo" | Out-File -FilePath $buildBatPath -Append -Encoding ASCII
      "if errorlevel 1 exit /b 1" | Out-File -FilePath $buildBatPath -Append -Encoding ASCII
      "" | Out-File -FilePath $buildBatPath -Append -Encoding ASCII
      "endlocal" | Out-File -FilePath $buildBatPath -Append -Encoding ASCII
      
      Write-Host "Running build script..."
      & cmd /c "$buildBatPath"
      
      if ($LASTEXITCODE -ne 0) {
        Write-Host "Build script failed with exit code $LASTEXITCODE"
        exit $LASTEXITCODE
      }
      
      $env:PATH = $oldPath

after_build:
  - ps: |
      $arch = $env:ARCH
      $buildNumber = $env:APPVEYOR_BUILD_NUMBER
      $version = "2026.3.1.$buildNumber"
      $projectRoot = $env:APPVEYOR_BUILD_FOLDER
      
      $outputDir = if ($arch -eq "x64") { "$projectRoot\x64\Release_TS" } else { "$projectRoot\Release_TS" }
      $dllPath = Join-Path $outputDir "php_win32ps.dll"
      
      Write-Host "Looking for DLL at: $dllPath"
      
      if (-not (Test-Path $dllPath)) {
        Write-Host "DLL not found at expected location, searching..."
        $dlls = Get-ChildItem -Recurse -Filter "php_win32ps.dll" -ErrorAction SilentlyContinue
        if ($dlls) {
          $dllPath = $dlls[0].FullName
          Write-Host "Found DLL at: $dllPath"
        } else {
          Write-Host "ERROR: DLL not found"
          exit 1
        }
      }
      
      $artifactDir = "$projectRoot\artifacts"
      if (-not (Test-Path $artifactDir)) {
        New-Item -ItemType Directory -Path $artifactDir | Out-Null
      }
      
      $artifactName = "php_win32ps-${version}-${arch}.dll"
      Copy-Item $dllPath "$artifactDir\$artifactName"
      Write-Host "Artifact copied to: $artifactDir\$artifactName"

artifacts:
  - path: artifacts\*
    name: php_win32ps

deploy:
  - provider: GitHub
    auth_token:
      secure: YOUR_GITHUB_TOKEN_HERE
    artifact: php_win32ps
    draft: false
    prerelease: false
    on:
      branch: main
      appveyor_repo_tag: true

on_success:
  - ps: Write-Host "Build successful for PHP $env:PHP_VERSION ($env:ARCH)"

on_failure:
  - ps: Write-Host "Build failed for PHP $env:PHP_VERSION ($env:ARCH)"
